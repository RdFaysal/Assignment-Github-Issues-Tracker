<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="bg-base-200">
    <!-- HEADER -->

    <header class="bg-base-100 shadow">
      <div class="max-w-[1160px] mx-auto navbar flex-col lg:flex-row gap-4">
        <div class="flex-1 flex items-center gap-2">
          <img class="w-10 h-10" src="./assets/github-logo.png" />

          <a class="text-xl font-bold"> GitHub Issues Tracker </a>
        </div>

        <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto">
          <label class="input input-bordered flex items-center gap-2 w-full">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 opacity-50"
              viewBox="0 0 24 24"
            >
              <circle
                cx="11"
                cy="11"
                r="8"
                stroke="currentColor"
                stroke-width="2"
                fill="none"
              />

              <path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2" />
            </svg>

            <input
              id="searchInput"
              type="text"
              placeholder="Search issues..."
              class="grow"
            />
          </label>

          <button
            onclick="searchIssue()"
            class="btn btn-primary w-full sm:w-auto"
          >
            + New Issue
          </button>
        </div>
      </div>
    </header>

    <div class="max-w-[1160px] mx-auto p-4 sm:p-6">
      <!-- BUTTONS -->

      <div
        class="flex flex-wrap gap-2 my-4 bg-base-100 p-4 rounded-lg justify-center sm:justify-start"
      >
        <button
          id="allBtn"
          class="btn btn-outline tab-btn border-gray-300 text-gray-600"
        >
          All
        </button>

        <button
          id="openBtn"
          class="btn btn-outline tab-btn border-gray-300 text-gray-600"
        >
          Open
        </button>

        <button
          id="closedBtn"
          class="btn btn-outline tab-btn border-gray-300 text-gray-600"
        >
          Closed
        </button>
      </div>

      <!-- INFO -->

      <div
        class="flex flex-col md:flex-row md:justify-between gap-4 my-4 bg-base-100 p-4 rounded-lg"
      >
        <div class="flex items-center gap-3">
          <div class="p-2 bg-base-300 rounded-full">
            <img class="w-8 h-8" src="./assets/Aperture.png" />
          </div>

          <div>
            <p class="font-medium">50 Issues</p>

            <span class="text-sm text-gray-400">
              Track and manage your project issues
            </span>
          </div>
        </div>

        <div class="flex gap-6 items-center">
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-teal-500"></span>

            <p>Open</p>
          </div>

          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-purple-500"></span>

            <p>Closed</p>
          </div>
        </div>
      </div>

      <!-- LOADING -->

      <div id="spinner" class="text-center hidden">
        <span class="loading loading-spinner loading-lg"></span>
      </div>

      <!-- CARDS -->

      <div
        id="issuesContainer"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"
      ></div>
    </div>

    <!-- MODAL -->

    <dialog id="issueModal" class="modal">
      <form method="dialog" class="modal-box max-w-lg space-y-3">
        <h3 id="modalTitle" class="font-bold text-lg"></h3>

        <div class="flex flex-wrap gap-2">
          <span id="modalStatus" class="badge"></span>

          <p><span id="modalAuthor"></span></p>

          <p><span id="modalCreatedAt"></span></p>
        </div>

        <div class="flex gap-3 flex-wrap">
          <span id="modalBug" class="badge bg-red-100 text-red-600"> Bug </span>

          <span id="modalHelp" class="badge bg-yellow-100 text-yellow-600">
            HELP WANTED
          </span>
        </div>

        <p id="modalDesc" class="py-2"></p>

        <div
          class="flex flex-col sm:flex-row gap-6 text-sm text-gray-500 mt-2 bg-base-200 p-4 rounded-lg"
        >
          <div>
            <p>Assignee:</p>

            <span class="font-medium" id="modalAssignee"></span>
          </div>

          <div>
            <p>Priority:</p>

            <span id="modalPriority" class="badge bg-red-300"></span>
          </div>
        </div>

        <div class="modal-action">
          <button class="btn btn-primary">Close</button>
        </div>
      </form>
    </dialog>

    <script src="js/script.js"></script>
  </body>
</html>
